<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinical Diabetes Record Book</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            @page {
                size: 176mm 250mm;
                margin: 0;
            }
            body {
                margin: 0 !important;
                padding: 0 !important;
                background: white !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            .no-print {
                display: none !important;
            }
            .page-break {
                page-break-after: always;
                break-after: page;
            }
            #root {
                width: 176mm;
            }
        }
        body {
            background-color: #f3f4f6;
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            padding: 0;
        }
        /* B5 Page Container */
        .b5-page {
            width: 176mm;
            height: 250mm;
            background: white;
            position: relative;
            overflow: hidden;
            box-sizing: border-box;
            color: black;
            font-size: 11pt;
            line-height: 1.4;
        }
        @media screen {
            .b5-page {
                box-shadow: 0 0 20px rgba(0,0,0,0.2);
                margin: 2rem auto;
            }
            .print-mode-active .b5-page {
                margin: 0 auto !important;
                box-shadow: none !important;
            }
        }
        @media print {
            .b5-page {
                box-shadow: none !important;
                margin: 0 !important;
                border: none !important;
            }
        }
        /* Alternating Margins for Binding (Odd = Right, Even = Left) */
        .b5-page-odd {
            padding: 12mm 12mm 15mm 18mm;
        }
        .b5-page-even {
            padding: 12mm 18mm 15mm 12mm;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4"
  }
}
</script>
</head>
<body class="no-scrollbar">
    <div id="root"></div>
</body>
</html>
